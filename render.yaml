services:
  - type: web
    name: reportabilidad-soldesp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_PATH
        value: /var/data/reportabilidad.db
    disk:
      name: reportabilidad-data
      mountPath: /var/data
      sizeGB: 1
